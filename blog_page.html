<!DOCTYPE html>
<html>
  <head>
    <title>Redberry Blog</title>

    <link rel="stylesheet" href="styles/shared/header.css" />
    <link rel="stylesheet" href="styles/shared/general.css" />
    <link rel="stylesheet" href="styles/shared/blog_container.css" />
    <link rel="stylesheet" href="styles/blog_page.css" />
    <link rel="stylesheet" href="styles/login.css" />

    <link rel="stylesheet" href="libs/assets/owl.carousel.css" />
    <link rel="stylesheet" href="libs/assets/owl.theme.default.css" />
  </head>
  <body>
    <!-- Website header -->

    <div class="header-1">
      <img class="logo" src="images/logo.png" />
      <button class="login-button">შესვლა</button>
    </div>

    <button class="return-button">&lt;</button>

    <div id="login-overlay-background"></div>
    <div id="login-overlay">
      <button class="login-exit-button" style="cursor: pointer">&#10006;</button>

      <div class="login-input-block">
        <p class="login-title">შესვლა</p>
        <label for="login-input" class="login-input-label">ელ-ფოსტა</label>
        <input id="login-input" class="login-input" placeholder="Example@redberry.ge" />

        <div class="login-error-message">
          <div class="login-info-circle">i</div>
          <span>ელ-ფოსტა არ მოიძებნა</span>
        </div>
      </div>

      <div class="login-success-block">
        <div class="login-success-checkmark">&#10003;</div>
        <p class="login-success-message">წარმატებული ავორიზაცია</p>
      </div>
      <button class="login-input-button">შესვლა</button>
    </div>

    <!-- Blog -->

    <div class="blog-column"></div>

    <!-- Blog recommendations slider -->

    <div class="blog-recommendation">
      <p class="blog-slider-title">მსგავსი სტატიები</p>
      <div id="js-blog-slider" class="blog-slider js-blog-slider owl-carousel"></div>
    </div>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
      integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script src="libs/owl.carousel.js"></script>
    <script type="module" src="scripts/blog_page.js"></script>
  </body>
</html>
