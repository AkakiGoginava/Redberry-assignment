<!DOCTYPE html>
<html>
  <head>
    <title>Redberry blog</title>

    <link rel="stylesheet" href="styles/shared/header.css" />
    <link rel="stylesheet" href="styles/shared/general.css" />
    <link rel="stylesheet" href="styles/create_blog.css" />
  </head>
  <body>
    <!-- Website header -->
    <div class="header-1">
      <img class="logo" src="images/logo.png" />
    </div>
    <button class="return-button">&lt;</button>

    <!-- Create blog form -->
    <form class="blog-form-block">
      <p class="form-title">ბლოგის დამატება</p>

      <div class="image-input-block">
        <p class="input-label">ატვირთეთ ფოტო</p>

        <div class="image-drop-area">
          <input type="file" class="image-input" id="file-dropover" />
          <p class="drop-image-icon">📁</p>
          <p class="drop-image-text">
            ჩააგდეთ ფაილი აქ ან
            <span class="choose-image-file-link">აირჩიეთ ფაილი</span>
          </p>
        </div>

        <div class="image-visualiser">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              background-color: #f4f3ff;
              border: 1px solid black;
              border-radius: 12px;
              padding: 0 15px;
            "
          >
            <div style="display: flex; align-items: center">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
              >
                <path
                  opacity="0.4"
                  d="M22 7.81V13.9L20.37 12.5C19.59 11.83 18.33 11.83 17.55 12.5L13.39 16.07C12.61 16.74 11.35 16.74 10.57 16.07L10.23 15.79C9.52 15.17 8.39 15.11 7.59 15.65L2.67 18.95L2.56 19.03C2.19 18.23 2 17.28 2 16.19V7.81C2 4.17 4.17 2 7.81 2H16.19C19.83 2 22 4.17 22 7.81Z"
                  fill="#85858D"
                />
                <path
                  d="M9.00012 10.38C10.3146 10.38 11.3801 9.31444 11.3801 8C11.3801 6.68556 10.3146 5.62 9.00012 5.62C7.68568 5.62 6.62012 6.68556 6.62012 8C6.62012 9.31444 7.68568 10.38 9.00012 10.38Z"
                  fill="#85858D"
                />
                <path
                  d="M21.9996 13.9V16.19C21.9996 19.83 19.8296 22 16.1896 22H7.80957C5.25957 22 3.41957 20.93 2.55957 19.03L2.66957 18.95L7.58957 15.65C8.38957 15.11 9.51957 15.17 10.2296 15.79L10.5696 16.07C11.3496 16.74 12.6096 16.74 13.3896 16.07L17.5496 12.5C18.3296 11.83 19.5896 11.83 20.3696 12.5L21.9996 13.9Z"
                  fill="#85858D"
                />
              </svg>
              <p class="image-visualiser-text" style="padding-left: 10px"></p>
            </div>

            <svg
              class="image-visualiser-exit-icon"
              style="cursor: pointer"
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
            >
              <path
                d="M7.75781 16.2426L16.2431 7.75736"
                stroke="#1A1A1F"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M16.2431 16.2426L7.75781 7.75736"
                stroke="#1A1A1F"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
        </div>
      </div>

      <br />

      <div class="author-title-input-block">
        <div class="author-input-block">
          <p class="input-label">ავტორი *</p>
          <input
            class="author-input standard-input"
            placeholder="შეიყვანეთ ავტორი"
          />
          <p class="author-input-min-symbols standard-requirement">
            &#8226; მინიმუმ 4 სიმბოლო
          </p>
          <p class="author-input-min-words standard-requirement">
            &#8226; მინიმუმ 2 სიტყვა
          </p>
          <p class="author-input-georgian-letters standard-requirement">
            &#8226; მხოლოდ ქართული სიმბოლოები
          </p>
        </div>
        <div class="title-input-block">
          <p class="input-label">სათაური</p>
          <input
            class="title-input standard-input"
            placeholder="შეიყვანეთ სათაური"
          />
          <p class="input-title-requirement standard-requirement">
            მინიმუმ 2 სიმბოლო
          </p>
        </div>
      </div>
      <div class="descritpion-input-block">
        <p class="input-label">აღწერა *</p>
        <textarea
          class="description-input standard-input"
          placeholder="შეიყვანეთ აღწერა"
        ></textarea>
        <p class="description-input-requirement standard-requirement">
          მინიმუმ 2 სიმბოლო
        </p>
      </div>
      <div class="date-category-email-input-block">
        <div class="date-input-block">
          <p class="input-label">გამოქვეყნების თარიღი *</p>
          <input type="date" class="date-input standard-input" />
        </div>
        <div class="category-input-block">
          <p class="input-label">კატეგორია *</p>
          <input
            class="category-input standard-input"
            placeholder="აირჩიეთ კატეგორია"
          />
        </div>
        <div class="email-input-block">
          <p class="input-label">ელ-ფოსტა</p>
          <input
            class="email-input standard-input"
            placeholder="Example@redberry.ge"
          />
        </div>
      </div>
      <button class="publish-button">გამოქვეყნება</button>
    </form>

    <script type="module" src="/scripts/create_blog.js"></script>
  </body>
</html>
